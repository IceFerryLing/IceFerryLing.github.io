---
layout: default
title: 首页
---

<section class="hero">
  <div class="container">
    <div class="hero-overlay"></div>
    <img src="{{ '/assets/images/hero-purple.svg' | relative_url }}" alt="紫色风格博客封面" class="hero-image">
    <img src="{{ '/assets/images/anime-01.png' | relative_url }}" alt="二次元头像点缀" class="hero-deco">
    <div class="hero-content">
      <p class="eyebrow">ICEFERRYLING BLOG</p>
      <h1>欢迎来到我的紫色星云博客</h1>
      <p class="subtitle">记录代码、生活、灵感与每一次“啊哈”时刻。</p>
    </div>
  </div>
</section>

<section class="post-list-wrap">
  <div class="container">
    <h2>最新文章</h2>
    <div class="post-grid">
      {% for post in site.posts limit: 6 %}
        <article class="post-card">
          <p class="post-meta">{{ post.date | date: "%Y-%m-%d" }}</p>
          <h3><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h3>
          <p>{{ post.excerpt | strip_html | truncate: 110 }}</p>
        </article>
      {% endfor %}
    </div>
    <div class="post-deco">
      <img src="{{ '/assets/images/anime-03.png' | relative_url }}" alt="二次元头像点缀">
    </div>
  </div>
 </section>
