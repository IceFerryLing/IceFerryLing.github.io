---
layout: default
---
<section class="post-hero">
  <div class="container">
    <p class="post-meta">{{ page.date | date: '%Y-%m-%d' }}</p>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.description %}
      <p class="post-subtitle">{{ page.description }}</p>
    {% endif %}
  </div>
</section>

<section class="post-content">
  <div class="container prose">
    {{ content }}
  </div>
</section>
