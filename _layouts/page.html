---
layout: default

<section class="page-hero">
  <div class="container">
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="page-subtitle">{{ page.description }}</p>
    {% endif %}
  </div>
</section>

<section class="page-content">
  <div class="container prose">
    {{ content }}
  </div>
</section>
